<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Marcos Muniz - Gravações</title>
    <style>
        :root { --primary: #1e40af; --accent: #3b82f6; --bg: #f1f5f9; --text: #0f172a; --danger: #ef4444; --success: #059669; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 20px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .header-site { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .header-actions { display: flex; gap: 10px; }
        
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .full-width { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-print { background: var(--success); }
        .btn-backup { background: #1e293b; font-size: 0.8rem; padding: 8px 15px; width: auto; margin: 0; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }

        .search-area { margin: 25px 0; padding: 15px; background: #eff6ff; border-radius: 8px; border: 1px solid #bfdbfe; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }

        .finance-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; padding: 20px; background: #1e293b; color: white; border-radius: 8px; }
        .summary-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: bold; }

        @media print { 
            .container, .btn, .search-area, .form-section, .finance-summary, .header-actions { display: none !important; } 
            .print-only { display: block !important; } 
            .notinha { border: 1px solid #000; padding: 20px; width: 100%; max-width: 500px; margin: auto; font-family: Courier, monospace; } 
            .linha { display: flex; justify-content: space-between; margin: 5px 0; } 
        }
        .print-only { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-site">
        <h1>Gestão Marcos Muniz - Gravações</h1>
        <div class="header-actions">
            <button class="btn btn-backup" onclick="exportarBackup()">💾 Backup</button>
            <button class="btn btn-backup" style="background:#64748b" onclick="document.getElementById('inputArquivo').click()">📂 Restaurar</button>
            <input type="file" id="inputArquivo" accept=".csv" style="display:none" onchange="importarBackup(event)">
        </div>
    </div>
    
    <div class="form-section">
        <div class="full-width"><label>Cliente</label><input type="text" id="cliente" placeholder="Nome do cliente"></div>
        <div class="full-width"><label>Serviço</label><input type="text" id="servico" placeholder="Descrição do trabalho"></div>
        <div><label>Data</label><input type="date" id="data"></div>
        <div><label>Qtd</label><input type="number" id="quantidade" value="1" oninput="calcular()"></div>
        <div><label>V. Unit (R$)</label><input type="number" id="valorUnit" step="0.01" oninput="calcular()"></div>
        <div><label>V. Total (R$)</label><input type="number" id="valorTotal" readonly></div>
        <div><label>V. Pago (R$)</label><input type="number" id="valorPago" step="0.01" value="0"></div>
    </div>
    <button class="btn" onclick="adicionar()">Salvar Registro</button>

    <div class="search-area">
        <label>🔎 Filtrar Cliente / Código:</label>
        <input type="text" id="filtro" placeholder="Digite nome ou código..." onkeyup="atualizarTabela()">
        <button class="btn btn-print" onclick="gerarExtrato()">Gerar Extrato do Cliente</button>
    </div>

    <table>
        <thead><tr><th>Cód.</th><th>Data</th><th>Cliente</th><th>Serviço</th><th>Total</th><th>Saldo</th><th>Ação</th></tr></thead>
        <tbody id="tabelaBody"></tbody>
    </table>

    <div class="finance-summary">
        <div class="summary-card"><h4>Total Recebido</h4><p style="color: #86efac" id="totalRecebido">R$ 0,00</p></div>
        <div class="summary-card"><h4>Total em Aberto</h4><p style="color: #fca5a5" id="totalAberto">R$ 0,00</p></div>
        <div class="summary-card"><h4>Faturamento Bruto</h4><p id="totalGeral">R$ 0,00</p></div>
    </div>
</div>

<div id="areaImpressao" class="print-only"></div>

<script>
    let dados = JSON.parse(localStorage.getItem('servicos_v17')) || [];
    let codigosClientes = JSON.parse(localStorage.getItem('codigos_clientes')) || {};
    document.getElementById('data').valueAsDate = new Date();

    function calcular() {
        const q = parseFloat(document.getElementById('quantidade').value) || 0;
        const u = parseFloat(document.getElementById('valorUnit').value) || 0;
        document.getElementById('valorTotal').value = (q * u).toFixed(2);
    }

    function adicionar() {
        const cli = document.getElementById('cliente').value;
        const ser = document.getElementById('servico').value;
        const dat = document.getElementById('data').value;
        const tot = parseFloat(document.getElementById('valorTotal').value) || 0;
        const pag = parseFloat(document.getElementById('valorPago').value) || 0;

        if(!cli || !ser || tot === 0) return alert("Preencha os campos.");

        const nomeN = cli.trim().toUpperCase();
        if(!codigosClientes[nomeN]) codigosClientes[nomeN] = Math.floor(1000 + Math.random() * 9000);
        
        dados.push({ id: Date.now(), cod: codigosClientes[nomeN], cli, ser, dat, tot, pag, saldo: tot - pag });
        salvar();
        limpar();
    }

    function salvar() {
        localStorage.setItem('servicos_v17', JSON.stringify(dados));
        localStorage.setItem('codigos_clientes', JSON.stringify(codigosClientes));
        atualizarTabela();
    }

    function limpar() {
        document.getElementById('cliente').value = '';
        document.getElementById('servico').value = '';
        document.getElementById('valorUnit').value = '';
        document.getElementById('valorTotal').value = '';
        document.getElementById('valorPago').value = '0';
    }

    function excluir(id) { if(confirm("Excluir?")) { dados = dados.filter(d => d.id !== id); salvar(); } }

    function atualizarTabela() {
        const f = document.getElementById('filtro').value.toLowerCase();
        const body = document.getElementById('tabelaBody');
        body.innerHTML = '';
        let sP = 0, sG = 0;

        dados.forEach(d => { sP += d.pag; sG += d.tot; });
        document.getElementById('totalRecebido').innerText = `R$ ${sP.toFixed(2).replace('.',',')}`;
        document.getElementById('totalAberto').innerText = `R$ ${(sG - sP).toFixed(2).replace('.',',')}`;
        document.getElementById('totalGeral').innerText = `R$ ${sG.toFixed(2).replace('.',',')}`;

        dados.filter(d => d.cli.toLowerCase().includes(f) || d.cod.toString().includes(f)).forEach(d => {
            body.innerHTML += `<tr>
                <td>#${d.cod}</td>
                <td>${d.dat.split('-').reverse().join('/')}</td>
                <td>${d.cli}</td>
                <td>${d.ser}</td>
                <td>R$ ${d.tot.toFixed(2).replace('.',',')}</td>
                <td style="color:${d.saldo > 0 ? 'red':'green'}">R$ ${d.saldo.toFixed(2).replace('.',',')}</td>
                <td><button class="btn-delete" onclick="excluir(${d.id})">🗑️</button></td>
            </tr>`;
        });
    }

    function gerarExtrato() {
        const f = document.getElementById('filtro').value.toLowerCase();
        const filtrados = dados.filter(d => d.cli.toLowerCase().includes(f) || d.cod.toString().includes(f));
        if(!f || filtrados.length === 0) return alert("Filtre um cliente.");

        let sT = 0, sP = 0, itens = '';
        filtrados.forEach(i => {
            sT += i.tot; sP += i.pag;
            itens += `<div class="linha"><span>${i.ser} (${i.dat.split('-').reverse().join('/')})</span><span>R$ ${i.tot.toFixed(2).replace('.',',')}</span></div>`;
        });

        document.getElementById('areaImpressao').innerHTML = `
            <div class="notinha">
                <h3 style="text-align:center;">EXTRATO DE CONTA</h3>
                <p><strong>CLIENTE:</strong> ${filtrados[0].cli.toUpperCase()}</p>
                <hr>
                ${itens}
                <div style="margin-top:10px; border-top: 1px solid #000; padding-top:10px;">
                    <div class="linha"><strong>SUBTOTAL:</strong><span>R$ ${sT.toFixed(2).replace('.',',')}</span></div>
                    <div class="linha"><strong>VALOR JÁ PAGO:</strong><span>R$ ${sP.toFixed(2).replace('.',',')}</span></div>
                    <div class="linha" style="font-size:1.2em; border-top: 1px dashed #000; margin-top:5px;">
                        <strong>SALDO DEVEDOR:</strong><span>R$ ${(sT - sP).toFixed(2).replace('.',',')}</span>
                    </div>
                </div>
            </div>`;
        window.print();
    }

    function exportarBackup() {
        let csv = "ID;Codigo;Cliente;Servico;Data;Total;Pago;Saldo\n";
        dados.forEach(d => { csv += `${d.id};${d.cod};${d.cli};${d.ser};${d.dat};${d.tot.toFixed(2)};${d.pag.toFixed(2)};${d.saldo.toFixed(2)}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup_marcos_muniz.csv`;
        a.click();
    }

    function importarBackup(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const linhas = e.target.result.split('\n');
            const novos = [];
            for (let i = 1; i < linhas.length; i++) {
                const c = linhas[i].split(';');
                if (c.length < 8) continue;
                novos.push({ 
                    id: parseInt(c[0]), cod: parseInt(c[1]), cli: c[2], ser: c[3], 
                    dat: c[4], tot: parseFloat(c[5]), pag: parseFloat(c[6]), saldo: parseFloat(c[7]) 
                });
                codigosClientes[c[2].toUpperCase()] = parseInt(c[1]);
            }
            if(confirm("Restaurar dados?")) { dados = novos; salvar(); }
        };
        reader.readAsText(event.target.files[0]);
    }

    atualizarTabela();
</script>
</body>
</html>
